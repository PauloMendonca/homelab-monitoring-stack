services:
  prometheus:
    image: prom/prometheus:v2.53.4
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - /mnt/pool_fast/db/monitoring/prometheus:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring
    depends_on:
      - alertmanager
      - blackbox-exporter
      - cadvisor
      - snmp-exporter
      - pfsense-gateway-exporter

  alertmanager:
    image: quay.io/prometheus/alertmanager:v0.28.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - /mnt/pool_fast/db/monitoring/alertmanager:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL}
      - GF_USERS_DEFAULT_THEME=light
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - /mnt/pool_fast/db/monitoring/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus

  grafana-mcp:
    profiles:
      - mcp
    image: grafana/mcp-grafana:${GRAFANA_MCP_IMAGE_TAG:-0.11.4}
    container_name: grafana-mcp
    restart: unless-stopped
    command:
      - -t
      - streamable-http
      - --address
      - 0.0.0.0:8000
      - --endpoint-path
      - /mcp
      - --metrics
      - --metrics-address
      - :9090
      - --disable-write
    environment:
      - GRAFANA_URL=${GRAFANA_MCP_GRAFANA_URL:-http://grafana:3000}
      - GRAFANA_SERVICE_ACCOUNT_TOKEN=${GRAFANA_MCP_SERVICE_ACCOUNT_TOKEN}
      - GRAFANA_ORG_ID=${GRAFANA_MCP_ORG_ID:-1}
    ports:
      - "${GRAFANA_MCP_PORT:-8010}:8000"
    expose:
      - "9090"
    networks:
      - monitoring
    depends_on:
      - grafana

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    cap_add:
      - NET_RAW
    volumes:
      - ./blackbox/config.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "9115:9115"
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    command:
      - --housekeeping_interval=30s
      - --docker_only=true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - monitoring

  snmp-exporter:
    image: prom/snmp-exporter:v0.27.0
    container_name: snmp-exporter
    restart: unless-stopped
    command:
      - --config.file=/etc/snmp_exporter/snmp.yml
    volumes:
      - ./snmp-exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    ports:
      - "9116:9116"
    networks:
      - monitoring

  pfsense-gateway-exporter:
    build:
      context: ./pfsense-exporter
    container_name: pfsense-gateway-exporter
    restart: unless-stopped
    environment:
      - PF_HOST=${PFSENSE_HOST}
      - PF_USER=${PFSENSE_SSH_USER}
      - PF_SSH_KEY_PATH=/run/secrets/pfsense_id_rsa
      - PF_KNOWN_HOSTS_PATH=/run/secrets/known_hosts
      - PF_GATEWAY_CMD=pfSsh.php playback gatewaystatus
    volumes:
      - ./secrets/pfsense_monitoring_rsa:/run/secrets/pfsense_id_rsa:ro
      - ./secrets/known_hosts:/run/secrets/known_hosts:ro
    expose:
      - "9940"
    networks:
      - monitoring


  pfsense-wan-guard:
    build:
      context: ./wan-guard
    container_name: pfsense-wan-guard
    restart: unless-stopped
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - POLL_INTERVAL_SECONDS=15
      - DISABLE_LOSS_PERCENT=20
      - DISABLE_FOR_SECONDS=30
      - ENABLE_ZERO_LOSS_FOR_SECONDS=60
      - COOLDOWN_SECONDS=300
      - PREFERRED_WHEN_BOTH_BAD=WAN_NETMINAS_DHCP
      - SECONDARY_WAN_NAME=WAN_VALENET_DHCP
      - WAN_INTERFACE_MAP=WAN_NETMINAS_DHCP:opt1,WAN_VALENET_DHCP:wan
      - PF_HOST=${PFSENSE_HOST}
      - PF_USER=${PFSENSE_SSH_USER}
      - PF_SSH_KEY_PATH=/run/secrets/pfsense_id_rsa
      - PF_KNOWN_HOSTS_PATH=/run/secrets/known_hosts
      - METRICS_PORT=9950
    volumes:
      - ./secrets/pfsense_monitoring_rsa:/run/secrets/pfsense_id_rsa:ro
      - ./secrets/known_hosts:/run/secrets/known_hosts:ro
    expose:
      - "9950"
    networks:
      - monitoring
    depends_on:
      - prometheus
      - pfsense-gateway-exporter

  alert-router:
    profiles:
      - nextgen
    build:
      context: ./nextgen/alert_router
    container_name: alert-router
    restart: unless-stopped
    environment:
      - ALERT_SOURCE=${ALERT_SOURCE}
      - WHATSAPP_TO_GENERAL=${WHATSAPP_TO_GENERAL}
      - WHATSAPP_TO_CRITICAL=${WHATSAPP_TO_CRITICAL}
      - NOTIFY_API_URL=${NOTIFY_API_URL}
      - NOTIFY_API_KEY=${NOTIFY_API_KEY}
      - EVOLUTION_BASE_URL=${EVOLUTION_BASE_URL}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_WEBHOOK_SECRET=${EVOLUTION_WEBHOOK_SECRET}
      - ALLOWED_WHATSAPP_SENDERS=${ALLOWED_WHATSAPP_SENDERS}
    ports:
      - "8081:8081"
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
