global:
  resolve_timeout: 5m

route:
  receiver: default-null
  group_by: ["alertname", "severity", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - receiver: whatsapp-critical
      matchers:
        - severity="critical"
      group_wait: 10s
      repeat_interval: 30m
    - receiver: whatsapp-warning
      matchers:
        - severity="warning"
      group_wait: 2m
      repeat_interval: 4h

receivers:
  - name: default-null

  - name: whatsapp-critical
    webhook_configs:
      - url: http://whatsapp-relay:8080/alertmanager
        send_resolved: true

  - name: whatsapp-warning
    webhook_configs:
      - url: http://whatsapp-relay:8080/alertmanager
        send_resolved: true
