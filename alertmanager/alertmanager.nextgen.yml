global:
  resolve_timeout: 5m

route:
  receiver: alert-router
  group_by: ["alertname", "severity", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: alert-router
    webhook_configs:
      - url: http://alert-router:8081/alertmanager
        send_resolved: true
