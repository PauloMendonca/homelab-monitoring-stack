apiVersion: apps/v1
kind: Deployment
metadata:
  name: notify-worker
  namespace: ai-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notify-worker
  template:
    metadata:
      labels:
        app: notify-worker
    spec:
      containers:
        - name: notify-worker
          image: localhost:32000/notify-worker:v0.1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: notify-config
          env:
            - name: EVOLUTION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: notify-api-secrets
                  key: EVOLUTION_API_KEY
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
