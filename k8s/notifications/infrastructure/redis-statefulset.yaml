apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-notify
  namespace: ai-platform
spec:
  serviceName: redis-notify
  replicas: 1
  selector:
    matchLabels:
      app: redis-notify
  template:
    metadata:
      labels:
        app: redis-notify
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          args:
            - redis-server
            - --appendonly
            - yes
            - --appendfsync
            - everysec
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: nfs-production
        resources:
          requests:
            storage: 20Gi
